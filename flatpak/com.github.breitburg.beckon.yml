#
# For a reproducible (offline) build the cargo dependencies are vendored via
# cargo-sources.json — regenerate it whenever Cargo.lock changes by running
# build-aux/gen-cargo-sources.sh, then commit the result.
#
# Note the dconf permissions: writing the system-wide keybinding lives in
# host gsettings, so the sandbox needs dconf access. A native build needs none
# of this.
id: com.github.breitburg.beckon
runtime: io.elementary.Platform
runtime-version: '8'
sdk: io.elementary.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: com.github.breitburg.beckon

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # Browser-opening and host gsettings keybinding access:
  - --talk-name=org.freedesktop.portal.OpenURI
  - --talk-name=ca.desrt.dconf
  - --filesystem=xdg-run/dconf
  - --filesystem=~/.config/dconf:ro
  - --env=DCONF_USER_CONFIG_DIR=.config/dconf

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/beckon/cargo

modules:
  - name: beckon
    buildsystem: meson
    sources:
      - type: dir
        path: ..
      - cargo-sources.json   # generated by build-aux/gen-cargo-sources.sh, for offline builds
