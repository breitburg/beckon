#
# Starting Flatpak manifest. For a reproducible (offline) build you must vendor
# the cargo dependencies — generate `cargo-sources.json` with
# flatpak-cargo-generator and add it to the module's `sources`.
#
# Note the dconf permissions: writing the system-wide keybinding lives in
# host gsettings, so the sandbox needs dconf access. A native build needs none
# of this.
id: com.github.breitburg.elementary-intelligence
runtime: io.elementary.Platform
runtime-version: '8'
sdk: io.elementary.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: com.github.breitburg.elementary-intelligence

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # Browser-opening and host gsettings keybinding access:
  - --talk-name=org.freedesktop.portal.OpenURI
  - --talk-name=ca.desrt.dconf
  - --filesystem=xdg-run/dconf
  - --filesystem=~/.config/dconf:ro
  - --env=DCONF_USER_CONFIG_DIR=.config/dconf

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/elementary-intelligence/cargo

modules:
  - name: elementary-intelligence
    buildsystem: meson
    sources:
      - type: dir
        path: ..
      - cargo-sources.json   # generated by build-aux/gen-cargo-sources.sh, for offline builds
